name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
account_id = "36f6d38a2e47042e9faf67c027927ddc"

# Static assets (LIFF pages) served by Workers Assets
# SPA fallback ensures all non-API paths serve index.html
[assets]
directory = "dist/client"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "f0c79427-609f-4615-85e1-30efe3e0081a"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *"]
